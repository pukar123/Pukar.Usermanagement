# EMS local dev: SQL Server, MongoDB, Redis, Mongo Express UI, Next.js (ems-web)
# Run: docker compose up -d --build   OR use start-ems-docker.bat
#
# EMS.API runs on the host (dotnet run) and uses localhost:1433 for SQL — same ports as below.
# Pukar user management uses a dedicated database on that instance: PukarUsers (see ConnectionStrings:UserManagement).
# Browser loads the web app at http://localhost:3000 and calls the API at NEXT_PUBLIC_API_BASE_URL
# (default http://localhost:5246). Run API with: dotnet run --project EMS.API --launch-profile http
#
# Optional: copy docker-compose.env.example to .env to override NEXT_PUBLIC_* for the web image build.

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ems-sqlserver-dev
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Dev123!@#Strong"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - ems-sql-data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - ems-network

  mongodb:
    image: mongo:7.0
    container_name: ems-mongodb-dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: "Dev123!@#Strong"
    ports:
      - "27017:27017"
    volumes:
      - ems-mongo-data:/data/db
    restart: unless-stopped
    networks:
      - ems-network

  redis:
    image: redis:7.2-alpine
    container_name: ems-redis-dev
    command: redis-server --appendonly yes --requirepass "Dev123!@#Strong"
    ports:
      - "6379:6379"
    volumes:
      - ems-redis-data:/data
    restart: unless-stopped
    networks:
      - ems-network

  mongo-express:
    image: mongo-express:1.0.2
    container_name: ems-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: "Dev123!@#Strong"
      # Password URL-encoded (!@%#) so # does not truncate the URL
      ME_CONFIG_MONGODB_URL: mongodb://admin:Dev123%21%40%23Strong@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb
    networks:
      - ems-network

  ems-web:
    build:
      context: ./ems-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5246}
    container_name: ems-web-dev
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - ems-network

volumes:
  ems-sql-data:
    driver: local
  ems-mongo-data:
    driver: local
  ems-redis-data:
    driver: local

networks:
  ems-network:
    driver: bridge
