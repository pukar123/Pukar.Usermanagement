# EMS local dev: SQL Server, MongoDB, Redis, Mongo Express UI
# Run: docker compose up -d
# API on host uses localhost ports (see appsettings.json ConnectionStrings).

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ems-sqlserver-dev
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Dev123!@#Strong"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - ems-sql-data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - ems-network

  mongodb:
    image: mongo:7.0
    container_name: ems-mongodb-dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: "Dev123!@#Strong"
    ports:
      - "27017:27017"
    volumes:
      - ems-mongo-data:/data/db
    restart: unless-stopped
    networks:
      - ems-network

  redis:
    image: redis:7.2-alpine
    container_name: ems-redis-dev
    command: redis-server --appendonly yes --requirepass "Dev123!@#Strong"
    ports:
      - "6379:6379"
    volumes:
      - ems-redis-data:/data
    restart: unless-stopped
    networks:
      - ems-network

  mongo-express:
    image: mongo-express:1.0.2
    container_name: ems-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: "Dev123!@#Strong"
      # Password URL-encoded (!@%#) so # does not truncate the URL
      ME_CONFIG_MONGODB_URL: mongodb://admin:Dev123%21%40%23Strong@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb
    networks:
      - ems-network

volumes:
  ems-sql-data:
    driver: local
  ems-mongo-data:
    driver: local
  ems-redis-data:
    driver: local

networks:
  ems-network:
    driver: bridge
